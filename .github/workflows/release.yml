name: Build And Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build_windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Install FFmpeg
        run: choco install ffmpeg -y

      - name: Build Windows Installer
        id: win_build
        shell: pwsh
        continue-on-error: true
        run: |
          python scripts/build_installer.py --version ${{ github.ref_name }} *>&1 | Tee-Object -FilePath windows-build.log
          if ($LASTEXITCODE -ne 0) {
            Write-Host "build installer failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      - name: Upload Windows Artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/M3U8-Downloader-Setup.exe
          if-no-files-found: ignore

      - name: Upload Windows Portable Artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: dist/M3U8-Downloader.exe
          if-no-files-found: ignore

      - name: Upload Windows Build Log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-log
          path: windows-build.log
          if-no-files-found: ignore

      - name: Fail Job If Installer Build Failed
        if: ${{ steps.win_build.outcome != 'success' }}
        run: exit 1

  build_macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Build macOS Installer
        run: python3 scripts/build_installer.py --version ${{ github.ref_name }}

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            dist/M3U8-Downloader-Installer.pkg
            dist/M3U8-Downloader-Installer.dmg

  release:
    runs-on: ubuntu-latest
    needs:
      - build_windows
      - build_macos
    if: ${{ always() && (needs.build_windows.result == 'success' || needs.build_macos.result == 'success') }}
    steps:
      - name: Download Windows Artifact
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-assets/windows-installer

      - name: Download Windows Portable Artifact
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: windows-portable
          path: release-assets/windows-portable

      - name: Download Windows Build Log
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: windows-build-log
          path: release-assets/windows-build-log

      - name: Download macOS Artifacts
        if: ${{ needs.build_macos.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: macos-installers
          path: release-assets/macos-installers

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            release-assets/windows-installer/M3U8-Downloader-Setup.exe
            release-assets/windows-portable/M3U8-Downloader.exe
            release-assets/windows-build-log/windows-build.log
            release-assets/macos-installers/M3U8-Downloader-Installer.pkg
            release-assets/macos-installers/M3U8-Downloader-Installer.dmg
