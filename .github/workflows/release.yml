name: Build And Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build_windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Install FFmpeg
        run: choco install ffmpeg -y

      - name: Build Windows Installer
        run: python scripts/build_installer.py --version ${{ github.ref_name }}

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/M3U8-Downloader-Setup.exe

  build_macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Build macOS Installer
        run: python3 scripts/build_installer.py --version ${{ github.ref_name }}

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            dist/M3U8-Downloader-Installer.pkg
            dist/M3U8-Downloader-Installer.dmg

  release:
    runs-on: ubuntu-latest
    needs:
      - build_windows
      - build_macos
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/windows-installer/M3U8-Downloader-Setup.exe
            release-assets/macos-installers/M3U8-Downloader-Installer.pkg
            release-assets/macos-installers/M3U8-Downloader-Installer.dmg
